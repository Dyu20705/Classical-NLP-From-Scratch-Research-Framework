# Experiment configuration for baseline runs

dataset:
  # Path to CSV file containing text and label columns
  # Can be absolute or repository-relative
  path: ../data/raw/sst/train.csv
  text_col: sentence
  label_col: target
  max_rows: 20000

preprocessing:
  remove_stopwords: true
  remove_numbers: true
  stemming: false

vectorizer:
  type: tfidf
  lowercase: true
  ngram_range: [1, 1]
  max_features: 10000

models:
  naive_bayes:
    alpha: 1.0
  decision_tree:
    max_depth: 6
    min_samples_split: 2
  random_forest:
    n_trees: 25
    max_depth: 8
    min_samples_split: 2
    random_state: 42
  knn:
    k: 5
  perceptron:
    learning_rate: 0.01
    n_iters: 500
  logistic_regression:
    learning_rate: 0.1
    n_iters: 1000
    threshold: 0.5
    verbose: false
  svm:
    learning_rate: 0.001
    lambda_param: 0.01
    n_iters: 1000
  neural_network:
    hidden_size: 32
    learning_rate: 0.05
    n_iters: 500
    random_state: 42
    verbose: false
  linear_regression:
    learning_rate: 0.01
    n_iters: 1000
    verbose: false
    threshold: 0.5

evaluation:
  test_size: 0.2
  random_seed: 42
  stratify: true

output:
  results_dir: ../results/experiments
  metrics_dir: ../results/experiments/metrics
  logs_dir: ../results/experiments/logs
  predictions_dir: ../results/experiments/predictions
  figures_dir: ../results/experiments/figures
  save_csv_predictions: true
  save_confusion: true

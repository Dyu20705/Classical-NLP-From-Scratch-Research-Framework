dataset:
  path: data/raw/sst/train.csv
  text_col: sentence
  label_col: target
  max_rows: 20000

preprocessing:
  remove_stopwords: true
  remove_numbers: true

vectorizer:
  lowercase: true
  ngram_range: [1, 1]
  max_features: 10000

models:
  naive_bayes:
    alpha: 1.0
  decision_tree:
    max_depth: 6
    min_samples_split: 2

evaluation:
  test_size: 0.2
  random_seed: 42
  stratify: true

output:
  results_dir: results/experiments
